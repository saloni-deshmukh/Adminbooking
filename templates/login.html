<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NTT DATA – Sign In</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;
    background:linear-gradient(135deg,#f3e8ff 0%,#ede0f7 40%,#e8d5f5 100%);
    display:flex;align-items:center;justify-content:center;
    font-family:'Segoe UI',Arial,sans-serif;
  }

  /* ── CARD ── */
  .card{
    display:flex;
    width:820px;max-width:96vw;
    border-radius:20px;
    box-shadow:0 28px 80px rgba(100,40,160,.22);
    overflow:hidden;
    min-height:480px;
  }

  /* ── LEFT PANEL (form) ── */
  .left{
    background:#fff;
    flex:1;
    padding:44px 44px 36px;
    display:flex;flex-direction:column;justify-content:center;
  }
  .logo-row{display:flex;align-items:center;margin-bottom:30px}
  .logo-row img{height:34px}

  .left h2{
    font-size:1.55rem;font-weight:700;
    color:#0e2d63;letter-spacing:.2px;margin-bottom:6px;
  }
  .left .tagline{color:#6b9fd4;font-size:.82rem;margin-bottom:28px}

  .form-group{margin-bottom:16px}
  label{display:block;font-size:.79rem;font-weight:600;color:#7a6690;margin-bottom:6px;letter-spacing:.2px}
  input[type=email],input[type=password],input[type=text]{
    width:100%;padding:12px 14px;
    border:1.8px solid #b8d4ef;border-radius:10px;
    font-size:.93rem;color:#2e1a4a;transition:.2s;background:#f4f9ff;
  }
  input:focus{outline:none;border-color:#407CC7;box-shadow:0 0 0 3px rgba(64,124,199,.12);background:#fff}

  .btn{
    width:100%;padding:13px;
    background:linear-gradient(90deg,#5B9FE0,#407CC7);
    color:#fff;border:none;border-radius:10px;
    font-size:.98rem;font-weight:700;cursor:pointer;
    transition:.2s;letter-spacing:.3px;margin-top:6px;
    box-shadow:0 4px 18px rgba(142,68,173,.3);
  }
  .btn:hover{background:linear-gradient(90deg,#b030cc,#7a3896);box-shadow:0 6px 22px rgba(142,68,173,.4)}
  .btn:disabled{opacity:.55;cursor:not-allowed}

  .error{
    background:#fff0f0;border:1px solid #f5c0c0;border-radius:8px;
    padding:10px 14px;color:#b00;font-size:.84rem;
    margin-bottom:14px;display:none;
  }

  .role-note{font-size:.76rem;color:#b0a0c0;text-align:center;margin-top:14px}

    <h2>Sign In</h2>
    <p class="tagline">Welcome back</p>

    <div class="error" id="errMsg"></div>

    <div class="form-group">
      <label>EMAIL ADDRESS</label>
      <input type="text" id="loginEmail" placeholder="yourname@bs.nttdata.com or admin" autocomplete="username"/>
    </div>
    <div class="form-group">
      <label>PASSWORD</label>
      <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password"/>
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>
  </div>

  <!-- RIGHT DECORATIVE PANEL -->
  <div class="right">
    <div class="right-overlay"></div>
    <div class="circle c1"></div>
    <div class="circle c2"></div>
    <div class="circle c3"></div>
    <div class="right-text">
      <h3>Hey,<br>Welcome<br>Back</h3>
      <p>NTT DATA<br>Room Booking System</p>
    </div>
  </div>

</div>

<script>
document.addEventListener('keydown', e => { if(e.key === 'Enter') doLogin(); });

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPassword').value.trim();
  const err   = document.getElementById('errMsg');
  const btn   = document.getElementById('loginBtn');
  err.style.display = 'none';

  if(!email || !pass){
    err.textContent = 'Please enter your email and password.';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';

  try{
    const r = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email: email, password: pass})
    });
    const d = await r.json();
    if(d.status === 'ok'){
      window.location.href = d.role === 'admin' ? '/admin' : '/booking';
    } else {
      err.textContent = d.message || 'Invalid email or password.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign In';
    }
  } catch(e){
    err.textContent = 'Network error. Please try again.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}
</script>
