# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - Adminbookingw

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: windows-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Docker login to container registry
        uses: docker/login-action@v2
        with:
          registry: bde9cb10d8764b40b0cda19fd5c30a0b.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_4D284AD677ED4C208FD741C649542F60 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_BD046F6F7D90404E8315B739379A539A }}
          

      - name: Build and Push container to registry
        run: |
          docker build -t bde9cb10d8764b40b0cda19fd5c30a0b.azurecr.io/admin_book_w:${{ github.sha }} .
          docker push bde9cb10d8764b40b0cda19fd5c30a0b.azurecr.io/admin_book_w:${{ github.sha }}
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2859F4B17E41406C96B37C563D2B4DB0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D07D1911DEEB4113BCF5C76D74C41030 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AA2B06394D89445684DDB67B38ECBFAF }}

      - name: Deploy container to Azure App Service
        uses: Azure/webapps-deploy@v2
        with:
          app-name: 'Adminbookingw'
          slot-name: 'Production'
          images: 'bde9cb10d8764b40b0cda19fd5c30a0b.azurecr.io/admin_book_w:${{ github.sha }}'
          
